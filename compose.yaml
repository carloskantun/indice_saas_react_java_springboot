services:
  minio:
    image: minio/minio:latest
    container_name: indice-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    volumes:
      - ./ops/minio/attendance-cors.json:/config/attendance-cors.json:ro
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done &&
      mc mb --ignore-existing local/indice-hr-attendance &&
      mc anonymous set none local/indice-hr-attendance &&
      mc mb --ignore-existing local/indice-hr-biometric &&
      mc anonymous set none local/indice-hr-biometric &&
      mc cors set local/indice-hr-attendance /config/attendance-cors.json &&
      mc cors set local/indice-hr-biometric /config/attendance-cors.json
      "

  face-service:
    build:
      context: .
      dockerfile: services/face_verification/Dockerfile
    container_name: indice-face-service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8091:8091"

volumes:
  minio-data:
