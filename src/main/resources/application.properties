spring.application.name=indice-erp-api

server.port=8082
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=12h

spring.datasource.url=jdbc:mysql://127.0.0.1:3307/indice_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8
spring.datasource.username=indice_user
spring.datasource.password=indice_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Transitional Flyway setup for the existing shared legacy schema.
# The first migrate on a non-empty schema will create flyway_schema_history
# and tag the current database at baseline version 0 without replaying DDL.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.baseline-description=Legacy shared schema baseline
spring.flyway.clean-disabled=true
spring.flyway.validate-on-migrate=true

spring.sql.init.mode=never
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=false
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

logging.level.org.springframework.jdbc.core=INFO
