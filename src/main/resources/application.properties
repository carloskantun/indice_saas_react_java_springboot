spring.application.name=indice-erp-api

server.port=${SERVER_PORT:8082}
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:framework}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${APP_SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=${APP_SESSION_COOKIE_SAME_SITE:lax}
server.servlet.session.timeout=${APP_SESSION_TIMEOUT:12h}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3307/indice_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:indice_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:indice_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

app.web.allowed-origins=${APP_WEB_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}
app.storage.provider=${APP_STORAGE_PROVIDER:none}
app.storage.minio.endpoint=${APP_STORAGE_MINIO_ENDPOINT:http://127.0.0.1:9000}
app.storage.minio.public-endpoint=${APP_STORAGE_MINIO_PUBLIC_ENDPOINT:${APP_STORAGE_MINIO_ENDPOINT:http://127.0.0.1:9000}}
app.storage.minio.service-public-endpoint=${APP_STORAGE_MINIO_SERVICE_PUBLIC_ENDPOINT:${APP_STORAGE_MINIO_PUBLIC_ENDPOINT:${APP_STORAGE_MINIO_ENDPOINT:http://127.0.0.1:9000}}}
app.storage.minio.access-key=${APP_STORAGE_MINIO_ACCESS_KEY:minioadmin}
app.storage.minio.secret-key=${APP_STORAGE_MINIO_SECRET_KEY:minioadmin}
app.storage.minio.region=${APP_STORAGE_MINIO_REGION:us-east-1}
app.storage.minio.bucket-attendance=${APP_STORAGE_MINIO_BUCKET_ATTENDANCE:indice-hr-attendance}
app.storage.minio.bucket-biometric=${APP_STORAGE_MINIO_BUCKET_BIOMETRIC:indice-hr-biometric}
app.storage.minio.bucket-documents=${APP_STORAGE_MINIO_BUCKET_DOCUMENTS:indice-hr-documents}
app.storage.minio.presign-expiry-seconds=${APP_STORAGE_MINIO_PRESIGN_EXPIRY_SECONDS:900}

app.hr.attendance.enforce-location-radius=${APP_HR_ATTENDANCE_ENFORCE_LOCATION_RADIUS:false}
app.hr.face.enabled=${APP_HR_FACE_ENABLED:false}
app.hr.face.service-base-url=${APP_HR_FACE_SERVICE_BASE_URL:http://127.0.0.1:8091}
app.hr.face.session-expiry-seconds=${APP_HR_FACE_SESSION_EXPIRY_SECONDS:600}

# Transitional Flyway setup for the existing shared legacy schema.
# The first migrate on a non-empty schema will create flyway_schema_history
# and tag the current database at baseline version 0 without replaying DDL.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.baseline-description=Legacy shared schema baseline
spring.flyway.clean-disabled=true
# Allow the repo to fold early experimental migrations back into the base SQL files
# without breaking older local databases that already recorded those versions.
spring.flyway.ignore-migration-patterns=*:missing
spring.flyway.validate-on-migrate=true

spring.sql.init.mode=never
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=false
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

logging.level.org.springframework.jdbc.core=INFO
