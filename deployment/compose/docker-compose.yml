name: indice-erp

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    restart: unless-stopped
    command:
      - --character-set-server=${MYSQL_CHARACTER_SET:-utf8mb4}
      - --collation-server=${MYSQL_COLLATION:-utf8mb4_0900_ai_ci}
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-indice_db}
      MYSQL_USER: ${MYSQL_USER:-indice_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-indice_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p"$${MYSQL_ROOT_PASSWORD}" --silent
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ALLOWED_ORIGINS:-http://localhost:8080}
    ports:
      - ${MINIO_API_HOST_PORT:-9000}:9000
    volumes:
      - minio-data:/data

  minio-init:
    image: ${MINIO_MC_IMAGE:-minio/mc:latest}
    restart: "no"
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_ATTENDANCE: ${MINIO_BUCKET_ATTENDANCE:-indice-hr-attendance}
      MINIO_BUCKET_BIOMETRIC: ${MINIO_BUCKET_BIOMETRIC:-indice-hr-biometric}
      MINIO_CORS_FILE: /init/attendance-cors.json
    volumes:
      - ../docker/minio/init-minio.sh:/init/init-minio.sh:ro
      - ../../ops/minio/attendance-cors.json:/init/attendance-cors.json:ro
    entrypoint:
      - /bin/sh
      - /init/init-minio.sh

  face-service:
    build:
      context: ../..
      dockerfile: services/face_verification/Dockerfile
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:8091/internal/health || exit 1
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ../..
      dockerfile: deployment/docker/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      face-service:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      SERVER_FORWARD_HEADERS_STRATEGY: ${SERVER_FORWARD_HEADERS_STRATEGY:-framework}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-indice_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-indice_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-indice_pass}
      APP_STORAGE_PROVIDER: minio
      APP_STORAGE_MINIO_ENDPOINT: http://minio:9000
      APP_STORAGE_MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:8080/storage}
      APP_STORAGE_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      APP_STORAGE_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      APP_STORAGE_MINIO_REGION: ${MINIO_REGION:-us-east-1}
      APP_STORAGE_MINIO_BUCKET_ATTENDANCE: ${MINIO_BUCKET_ATTENDANCE:-indice-hr-attendance}
      APP_STORAGE_MINIO_BUCKET_BIOMETRIC: ${MINIO_BUCKET_BIOMETRIC:-indice-hr-biometric}
      APP_STORAGE_MINIO_PRESIGN_EXPIRY_SECONDS: ${MINIO_PRESIGN_EXPIRY_SECONDS:-900}
      APP_WEB_ALLOWED_ORIGINS: ${APP_WEB_ALLOWED_ORIGINS:-http://localhost:8080}
      APP_SESSION_COOKIE_SECURE: ${APP_SESSION_COOKIE_SECURE:-false}
      APP_SESSION_COOKIE_SAME_SITE: ${APP_SESSION_COOKIE_SAME_SITE:-lax}
      APP_SESSION_TIMEOUT: ${APP_SESSION_TIMEOUT:-12h}
      APP_HR_ATTENDANCE_ENFORCE_LOCATION_RADIUS: ${APP_HR_ATTENDANCE_ENFORCE_LOCATION_RADIUS:-false}
      APP_HR_FACE_ENABLED: ${APP_HR_FACE_ENABLED:-true}
      APP_HR_FACE_SERVICE_BASE_URL: http://face-service:8091
      APP_HR_FACE_SESSION_EXPIRY_SECONDS: ${APP_HR_FACE_SESSION_EXPIRY_SECONDS:-600}
      JAVA_OPTS: ${BACKEND_JAVA_OPTS:-}
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null "http://127.0.0.1:$${SERVER_PORT:-8082}/api/v1/health" || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  web:
    build:
      context: ../..
      dockerfile: deployment/docker/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - ${WEB_HOST_PORT:-8080}:8080
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  mysql-data:
  minio-data:
